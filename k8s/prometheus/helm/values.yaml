prometheus-node-exporter:
  enabled: false
serverFiles:
  prometheus.yml:
    rule_files: []
    scrape_configs:
      - job_name: 'tf_exporter'
        scrape_interval: 3m
        scrape_timeout: 90s
        static_configs:
          - targets: ['tfbi-exporter:9100']

